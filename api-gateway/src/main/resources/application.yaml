spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true  # Active la découverte automatique via Eureka
          lower-case-service-id: true  # URLs en minuscules
      routes:
        # Route pour product-service
        - id: product-service
          uri: lb://product-service  # lb = load balancer via Eureka
          predicates:
            - Path=/api/products/**

        # Route pour order-service
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**

server:
  port: 8080  # Port du Gateway

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false